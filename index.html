<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: url('bg.jpg') no-repeat center center/cover;
}

.overlay {
  height: 100vh;
  backdrop-filter: blur(12px);
  display: flex;
  justify-content: center;
  align-items: center;
}

.box {
  background: rgba(255, 255, 255, 0.15);
  padding: 25px;
  border-radius: 20px;
  text-align: center;
  color: white;
  width: 80%;
  max-width: 400px;
}

button {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

#msg {
  margin-top: 15px;
  font-size: 18px;
  line-height: 1.6;
}
</style>
</head>

<body>

<div class="overlay">
  <div class="box">
    <h2>Just for you 💖</h2>
    <button onclick="start()">Open</button>
    <div id="msg"></div>
  </div>
</div>

<script>
let text = `Kal jab maine aapka shaadi wala pic dekha na... 💘🔥

Kasam se aisa laga jaise aapne mere dil ka hi katal kar diya ho...

Sachi me Madam ji mere paas words hi nahi mile 🙂

Bas aisa laga jaise main kuch der ke liye ek alag hi duniya me kho gaya hun ✨😊`;

let i = 0;

function start(){
  type();
}

function type(){
  if(i < text.length){
    document.getElementById("msg").innerHTML += text.charAt(i);
    i++;
    setTimeout(type, 40);
  }
}
</script>

</body>
</html>
