
<style>
body {
  margin:0;
  font-family:Segoe UI;
  background:url('https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2') no-repeat center;
  background-size:cover;
  color:white;
}

.overlay {
  backdrop-filter: blur(10px);
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.box {
  background: rgba(255,255,255,0.1);
  padding:20px;
  border-radius:20px;
  text-align:center;
}

button {
  padding:10px 20px;
  border-radius:20px;
  border:none;
}

#msg {
  margin-top:20px;
  font-size:20px;
}
</style>

<div class="overlay">
  <div class="box">
    <h2>Just for you 💖</h2>
    <button onclick="start()">Open</button>
    <div id="msg"></div>
  </div>
</div>

<script>
let text = `Kal jab maine aapka shaadi wala pic dekha na... 💘🔥

Kasam se aisa laga jaise aapne mere dil ka hi katal kar diya ho...

Sachi me Madam ji mere paas words hi nahi mile 🙂

Bas aisa laga jaise main kuch der ke liye ek alag hi duniya me kho gaya hun ✨😊`;

let i=0;

function start(){
  type();
}

function type(){
  if(i<text.length){
    document.getElementById("msg").innerHTML += text.charAt(i);
    i++;
    setTimeout(type,40);
  }
}
</script>
